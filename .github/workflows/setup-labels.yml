name: Setup labels

permissions:
  contents: write
  issues: write
  actions: write

on:
  push:
    branches:
      - main
  repository_dispatch:  # Permite disparar manualmente

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout do repositório
      - name: Check out repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (não é estritamente necessário para EndBug, mas mantém se quiseres)
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Step temporária para testar se o secret está acessível
      - name: Test secret
        run: echo "${{ secrets.LABELS_TOKEN }}"

      # 4️⃣ Aplicar as labels com EndBug/label-sync
      - name: Apply labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels/labels.yml
          token: ${{ secrets.LABELS_TOKEN }}
          delete-other-labels: false
